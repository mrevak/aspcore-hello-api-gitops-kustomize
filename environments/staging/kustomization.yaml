apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
# cocicd rewrites `newTag` here on deploy / promotion
# (workflow update: { name: localhost:5000/aspcore-hello-api, new_tag: ... }).
# It also injects cocicd.io/* keys under commonAnnotations.
images:
  - name: localhost:5000/aspcore-hello-api
    newTag: latest